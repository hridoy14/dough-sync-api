<!DOCTYPE html>
<!--
  =============================================
  sidepanel.html — Side Panel Entry Point
  =============================================
  Extension: dough-sync-api
  Version: 5.0.0

  This is the Chrome Side Panel interface.
  Loaded when user enables side panel mode.
  Uses same i18n, templates, and logic as
  the floating popup (content.js).

  SCRIPT LOAD ORDER (must match):
    1. jszip.min.js        — ZIP library for downloads
    2. hwFingerprint.js    — Device fingerprinting
    3. i18n.js             — Translations & lang switcher
    4. sidepanel-templates.js — HTML templates for SP
    5. sounds.js           — Notification sounds
    6. sidepanel.js        — Main side panel logic
    7. license-fix.js      — License validation backup
  =============================================
-->
<html lang="en">
<head>
  <!-- Character encoding -->
  <meta charset="UTF-8">

  <!-- Viewport for responsive layout -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page title -->
  <title>dough-sync-api - Side Panel</title>

  <!-- Side panel styles -->
  <link rel="stylesheet" href="sidepanel.css">
</head>

<body>

  <!-- ============================================= -->
  <!-- HEADER: Brand, Language, Actions             -->
  <!-- ============================================= -->
   
  <div class="sp-header">
<!--
     Brand section: logo + name + version badge 
    <div class="sp-brand">
      <img
        class="sp-brand-logo"
        src="https://i.postimg.cc/VLGmvn74/Chat-GPT-Image-May-30-2026-06-24-01-PM.png"
        alt="dough-sync-api"
      >
      <span class="sp-brand-text">dough-sync-api</span>
      <span class="sp-badge">5.0.0</span>
    </div>

    Header action buttons 
    <div class="sp-header-actions">

       Language switcher: PT / EN / ES / HE 

      <div class="ql-lang-sw" id="sp-lang-sw">
        <button class="ql-lang-btn ql-lang-active" data-lang="pt">PT</button>
        <button class="ql-lang-btn" data-lang="en">EN</button>
        <button class="ql-lang-btn" data-lang="es">ES</button>
        <button class="ql-lang-btn" data-lang="he">HE</button>
      </div>

       Notifications button (with unread badge) 
      <button
        class="sp-icon-btn sp-notif-btn"
        data-i18n-title="header.notifications"
        title="Notifications"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="sp-notif-badge" style="display:none">0</span>
      </button>

      Theme toggle button (dark/light) 
      <button
        class="sp-icon-btn sp-theme-btn"
        data-i18n-title="header.theme"
        title="Theme"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      Logout / Sign Out button 
      <button
        class="sp-icon-btn sp-logout-btn"
        data-i18n-title="header.logout"
        title="Sign Out"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>

    </div>
  </div>
-->
  <!-- ============================================= -->
  <!-- BODY: Dynamic content container              -->
  <!-- ============================================= -->
  <!-- This is where sidepanel-templates.js injects -->
  <!-- the license gate, profile card, prompt UI,   -->
  <!-- history, etc. based on user's login state.   -->
  <div class="sp-body" id="sp-body">
    <!-- Initial loading state (shown until JS loads) -->
    <div
      class="sp-license-gate"
      id="sp-loading"
      style="padding:40px 0;text-align:center"
    >
      <p style="color:var(--ql-text-muted)" data-i18n="loading">
        ⏳ Loading...
      </p>
    </div>
  </div>

  <!-- ============================================= -->
  <!-- FOOTER: Back to popup + branding             -->
  <!-- ============================================= -->
   <!--
  <div class="sp-footer">

    Back to floating popup mode button 
    <button
      class="sp-back-to-popup"
      id="sp-back-to-popup"
      title="Back to floating mode"
      data-i18n="sp.backToPopup"
    >
      ◀ Popup
    </button>

   Branding badge 
    <span class="sp-footer-badge">Developed by dough-sync-api • v5.0.0</span>

  </div>
-->
  <!-- ============================================= -->
  <!-- NOTIFICATION PANEL (hidden by default)       -->
  <!-- ============================================= -->
  <!-- Slides down from header when bell is clicked -->
  <div class="sp-notif-panel" id="sp-notif-panel" style="display:none">

    <!-- Panel header with title + action buttons -->
    <div class="sp-notif-header">
      <span data-i18n="notif.title">Notifications</span>
      <div style="display:flex;gap:6px;align-items:center;">

        <!-- Mark all as read button -->
        <button
          id="sp-notif-markread"
          data-i18n-title="notif.markRead"
          title="Mark all as read"
          style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--ql-text-muted);padding:2px 6px;border-radius:4px;"
        >
          ✓ Read
        </button>

        <!-- Close panel button -->
        <button class="sp-notif-close" id="sp-notif-close">✕</button>
      </div>
    </div>
    <!-- Notification list container (populated by sidepanel.js) -->
    <div class="sp-notif-list" id="sp-notif-list">
      <p class="sp-notif-empty" data-i18n="notif.loading">Loading...</p>
    </div>
  </div>

  <!-- ============================================= -->
  <!-- SCRIPT LOAD ORDER                             -->
  <!-- ============================================= -->
  <!-- IMPORTANT: This order matters. Each script    -->
  <!-- depends on the previous ones.                 -->
  <!--   1. jszip.min.js        → ZIP compression    -->
  <!--   2. hwFingerprint.js    → Device ID          -->
  <!--   3. i18n.js             → Translations       -->
  <!--   4. sidepanel-templates.js → HTML templates  -->
  <!--   5. sounds.js           → Audio feedback     -->
  <!--   6. sidepanel.js        → Main SP logic      -->
  <!--   7. license-fix.js      → License validation -->
  <!-- ============================================= -->
  <script src="jszip.min.js"></script>
  <script src="hwFingerprint.js"></script>
  <script src="i18n.js"></script>
  <script src="sidepanel-templates.js"></script>
  <script src="sounds.js"></script>
  <script src="sidepanel.js"></script>
  <script src="license-fix.js"></script>
  <!-- Inline script removed for CSP compliance -->

 </body>
</html>
