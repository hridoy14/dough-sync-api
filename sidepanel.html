<!DOCTYPE html>
<!--
  =============================================
  sidepanel.html — Side Panel Entry Point
  =============================================
  Extension: dough-sync-api
  Version: 5.0.0

  This is the Chrome Side Panel interface.
  Loaded when user enables side panel mode.
  Uses same i18n, templates, and logic as
  the floating popup (content.js).

  SCRIPT LOAD ORDER (must match):
    1. jszip.min.js        — ZIP library for downloads
    2. hwFingerprint.js    — Device fingerprinting
    3. i18n.js             — Translations & lang switcher
    4. sidepanel-templates.js — HTML templates for SP
    5. sounds.js           — Notification sounds
    6. sidepanel.js        — Main side panel logic
    7. license-fix.js      — License validation backup
  =============================================
-->
<html lang="en">
<head>
  <!-- Character encoding -->
  <meta charset="UTF-8">

  <!-- Viewport for responsive layout -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page title -->
  <title>dough-sync-api - Side Panel</title>

  <!-- Side panel styles -->
  <link rel="stylesheet" href="sidepanel.css">
</head>

<body>

  
  <div class="sp-body" id="sp-body">
    <!-- Initial loading state (shown until JS loads) -->
    <div
      class="sp-license-gate"
      id="sp-loading"
      style="padding:40px 0;text-align:center"
    >
      <p style="color:var(--ql-text-muted)" data-i18n="loading">
        ⏳ Loading...
      </p>
    </div>
  </div>

  <
  <!-- ============================================= -->
  <!-- NOTIFICATION PANEL (hidden by default)       -->
  <!-- ============================================= -->
  <!-- Slides down from header when bell is clicked -->
  <div class="sp-notif-panel" id="sp-notif-panel" style="display:none">

    <!-- Panel header with title + action buttons -->
    <div class="sp-notif-header">
      <span data-i18n="notif.title">Notifications</span>
      <div style="display:flex;gap:6px;align-items:center;">

        <!-- Mark all as read button -->
        <button
          id="sp-notif-markread"
          data-i18n-title="notif.markRead"
          title="Mark all as read"
          style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--ql-text-muted);padding:2px 6px;border-radius:4px;"
        >
          ✓ Read
        </button>

        <!-- Close panel button -->
        <button class="sp-notif-close" id="sp-notif-close">✕</button>
      </div>
    </div>
    <!-- Notification list container (populated by sidepanel.js) -->
    <div class="sp-notif-list" id="sp-notif-list">
      <p class="sp-notif-empty" data-i18n="notif.loading">Loading...</p>
    </div>
  </div>

  <!-- ============================================= -->
  <!-- SCRIPT LOAD ORDER                             -->
  <!-- ============================================= -->
  <!-- IMPORTANT: This order matters. Each script    -->
  <!-- depends on the previous ones.                 -->
  <!--   1. jszip.min.js        → ZIP compression    -->
  <!--   2. hwFingerprint.js    → Device ID          -->
  <!--   3. i18n.js             → Translations       -->
  <!--   4. sidepanel-templates.js → HTML templates  -->
  <!--   5. sounds.js           → Audio feedback     -->
  <!--   6. sidepanel.js        → Main SP logic      -->
  <!--   7. license-fix.js      → License validation -->
  <!-- ============================================= -->
  <script src="jszip.min.js"></script>
  <script src="hwFingerprint.js"></script>
  <script src="i18n.js"></script>
  <script src="sidepanel-templates.js"></script>
  <script src="sounds.js"></script>
  <script src="sidepanel.js"></script>
  <script src="license-fix.js"></script>
  <!-- Inline script removed for CSP compliance -->

 </body>
</html>
